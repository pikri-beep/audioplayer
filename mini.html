<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NJOY Mini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mengambil font keren dari google khusus untuk widget mini */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&family=Chewy&family=Caveat:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            /* Kunci transparansi dan drag */
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .widget-container {
            /* Efek Glassmorphism (Kaca Buram) default */
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            width: 320px;
            height: 100px;
            display: flex;
            align-items: center;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Bikin seluruh area widget bisa di-drag dengan mouse */
            -webkit-app-region: drag; 
            transition: all 0.3s ease;
        }

        .cover-art {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .song-info {
            flex: 1;
            padding-left: 15px;
            overflow: hidden;
        }

        h3 {
            color: #fff;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        p {
            color: #aaa;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            align-items: center;
            /* Tombol TIDAK BOLEH bisa di-drag, biar bisa diklik */
            -webkit-app-region: no-drag; 
        }

        button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { color: #a855f7; transform: scale(1.1); }
        #play-btn { font-size: 24px; }
        
        .expand-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 14px;
            color: #888;
            -webkit-app-region: no-drag;
        }
        .expand-btn:hover { color: #fff; }

        /* =========================================
           TEMA UNTUK MINI PLAYER MENGAMBANG
           ========================================= */
        /* 1. MARVEL */
        [data-theme="marvel"] .widget-container { background: linear-gradient(145deg, rgba(102, 0, 0, 0.95), rgba(51, 0, 0, 0.95)); border: 1px solid #d4af37; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }
        [data-theme="marvel"] h3 { color: #d4af37; font-family: 'Bangers', sans-serif; letter-spacing: 1px; font-size: 18px; }
        [data-theme="marvel"] p { color: #fff; }
        [data-theme="marvel"] button:hover { color: #df1f2d; transform: scale(1.1); }
        [data-theme="marvel"] button { color: #d4af37; }

        /* 2. PIXEL ART */
        [data-theme="pixel"] * { font-family: 'Press Start 2P', monospace !important; }
        [data-theme="pixel"] .widget-container { background: #0000aa; border: 4px solid #fff; border-radius: 0; box-shadow: 4px 4px 0px #000; }
        [data-theme="pixel"] .cover-art { border-radius: 0; border: 2px solid #fff; }
        [data-theme="pixel"] h3 { font-size: 9px; text-shadow: 2px 2px 0px #000; }
        [data-theme="pixel"] p { font-size: 7px; color: #fff; }
        [data-theme="pixel"] button { color: #fff; text-shadow: 2px 2px 0px #000; }
        [data-theme="pixel"] button:hover { color: #aaa; transform: none; }

        /* 3. MINECRAFT */
        [data-theme="minecraft"] * { font-family: 'Press Start 2P', monospace !important; }
        [data-theme="minecraft"] .widget-container { background: #866043; border: 4px solid #3b2712; border-top: 8px solid #5fa032; border-radius: 0; box-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
        [data-theme="minecraft"] .cover-art { border-radius: 0; border: 2px solid #fff; image-rendering: crisp-edges; }
        [data-theme="minecraft"] h3 { font-size: 9px; color: #2e600a; text-shadow: 2px 2px 0px #3b2712; }
        [data-theme="minecraft"] p { font-size: 7px; color: #fff; }
        [data-theme="minecraft"] button { color: #c6c6c6; }
        [data-theme="minecraft"] button:hover { color: #fff; transform: none; }

        /* 4. SPIDERMAN */
        [data-theme="spiderman"] .widget-container { background: rgba(17, 17, 17, 0.95); border: 2px solid #df1f2d; box-shadow: 0 0 20px rgba(4, 54, 115, 0.8); }
        [data-theme="spiderman"] h3 { font-family: 'Bangers', cursive !important; font-size: 18px; color: #df1f2d; transform: skewY(-5deg); text-shadow: 2px 2px 0px #043673; display: inline-block;}
        [data-theme="spiderman"] button { color: #df1f2d; }
        [data-theme="spiderman"] button:hover { color: #043673; text-shadow: 0 0 5px #df1f2d;}
        [data-theme="spiderman"] .cover-art { border: 2px solid #df1f2d; }

        /* 5. TOY STORY */
        [data-theme="toystory"] .widget-container { background: rgba(255, 255, 255, 0.95); border: 3px solid #ff0000; box-shadow: 6px 6px 0px #223ca9; border-radius: 20px; }
        [data-theme="toystory"] h3 { font-family: 'Chewy', cursive !important; font-size: 18px; color: #fff000; -webkit-text-stroke: 1px #ff0000; text-shadow: 2px 2px 0px #223ca9; }
        [data-theme="toystory"] p { color: #223ca9; font-weight: bold; }
        [data-theme="toystory"] button { color: #223ca9; }
        [data-theme="toystory"] button:hover { color: #551a8b; }
        [data-theme="toystory"] .cover-art { border: 3px solid #223ca9; }

        /* 6. HACKER TERMINAL */
        [data-theme="hacker"] * { font-family: 'Courier New', Courier, monospace !important; }
        [data-theme="hacker"] .widget-container { background: rgba(0, 0, 0, 0.95); border: 1px solid #00ff00; border-radius: 0; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        [data-theme="hacker"] h3, [data-theme="hacker"] p, [data-theme="hacker"] button { color: #00ff00; }
        [data-theme="hacker"] button:hover { color: #fff; text-shadow: 0 0 5px #00ff00; }
        [data-theme="hacker"] .cover-art { filter: grayscale(100%) sepia(100%) hue-rotate(70deg) contrast(150%); border-radius: 0; border: 1px dashed #00ff00; }
    </style>
</head>
<body>

    <div class="widget-container">
        <img id="cover" class="cover-art" src="covers/default.png" alt="Cover">
        
        <div class="song-info">
            <h3 id="title">NJOY Player</h3>
            <p id="artist">Memuat...</p>
            
            <div class="controls">
                <button id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button id="play-btn"><i class="fa-solid fa-play"></i></button>
                <button id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>

        <button id="expand-btn" class="expand-btn" title="Kembali ke Layar Utama"><i class="fa-solid fa-expand"></i></button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Menerima data lagu dan TEMA dari Jendela Utama
        ipcRenderer.on('update-mini-player', (event, data) => {
            // TERAPKAN TEMA YANG DIKIRIM DARI JENDELA UTAMA!
            if(data.theme) {
                document.body.setAttribute('data-theme', data.theme);
            }

            document.getElementById('title').innerText = data.title;
            document.getElementById('artist').innerText = data.artist;
            document.getElementById('cover').src = data.cover;
            
            const playBtn = document.getElementById('play-btn');
            if (data.isPlaying) {
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        });

        // Mengirim perintah klik ke Jendela Utama
        document.getElementById('play-btn').addEventListener('click', () => ipcRenderer.send('mini-action', 'play'));
        document.getElementById('next-btn').addEventListener('click', () => ipcRenderer.send('mini-action', 'next'));
        document.getElementById('prev-btn').addEventListener('click', () => ipcRenderer.send('mini-action', 'prev'));
        document.getElementById('expand-btn').addEventListener('click', () => ipcRenderer.send('mini-action', 'expand'));
    </script>
</body>
</html>
