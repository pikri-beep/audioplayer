<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="player-container">
        <div class="song-info">
            <div class="album-art-wrapper">
    <div class="album-art">
        <img id="album-art-img" src="covers/default.png" alt="Album Art">
    </div>
        <button id="upload-cover-btn" class="camera-btn">
            <i class="fa-solid fa-camera"></i>
        </button>
    </div>
            
            <h2 id="song-title">Judul Lagu</h2>
            <p id="song-artist">Nama Artis</p>
        </div>

        <audio id="audio-element"></audio>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>

        <div class="extra-controls">
            <button id="shuffle-btn" class="sub-control-btn"><i class="fa-solid fa-shuffle"></i></button>
            <button id="repeat-btn" class="sub-control-btn"><i class="fa-solid fa-repeat"></i></button>
            <div class="volume-container" >
                <i id="volume-icon" class="fa-solid fa-volume-high"></i>
                <div class="volume-pop-container">
                    <input type="range" id="volume-slider" min="0" max="100" value="70">
                    <span id="volume-text">70%</span>
                </div>
            </div>
            <button id="mini-player-btn" class="sub-control-btn" title="Mini Player Mode"><i class="fa-solid fa-compress"></i></button>
            <button id="lyrics-toggle-btn" class="sub-control-btn" title="Lirik Karaoke"><i class="fa-solid fa-microphone"></i></button>
        </div>

        <div class="controls">
    <button id="playlist-toggle-btn" class="btn-secondary"><i class="fa-solid fa-bars"></i></button>
    
    <div class="main-playback">
        <button id="prev-btn" class="btn-main"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play-btn" class="btn-main" style="width: 60px; height: 60px; font-size: 22px;"><i class="fa-solid fa-play"></i></button>
        <button id="next-btn" class="btn-main"><i class="fa-solid fa-forward-step"></i></button>
    </div>

    <div class="right-controls" style="display: flex; gap: 10px;">
        <button id="add-menu-btn" class="btn-secondary" title="Tambah Lagu"><i class="fa-solid fa-plus"></i></button>
        
        <!-- Dropdown Menu Tersembunyi -->
            <div id="add-dropdown" class="add-dropdown-menu">
                <button id="import-file-btn" class="dropdown-item"><i class="fa-solid fa-folder-open" style="width: 20px;"></i> File Lokal</button>
                <button id="import-yt-btn" class="dropdown-item"><i class="fa-brands fa-youtube" style="width: 20px;"></i> Dari YouTube</button>
            </div>
        </div>
    </div>
</div>

    <div id="playlist-popup" class="playlist-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Daftar Lagu</h3>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button id="settings-btn" class="header-btn">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button id="close-popup-btn" class="header-btn">&times;</button>
                </div>
            </div>
            
            <div class="playlist-mode-toggle" style="display: flex; gap: 10px; margin-bottom: 12px;">
                <button id="btn-mode-all" class="mode-btn active">Semua</button>
                <button id="btn-mode-njoy" class="mode-btn">Queue</button>
            </div>

            <div class="search-wrapper" style="margin-bottom: 15px;">
                <input type="text" id="search-bar" placeholder="Cari lagu...">
            </div>
            <div id="settings-panel">      
                <div class="setting-row">
                    <span>System Tray</span>
                    <label class="switch">
                        <input type="checkbox" id="tray-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>Now Playing</span>
                    <label class="switch">
                        <input type="checkbox" id="notification-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>Always On Top</span>
                    <label class="switch">
                        <input type="checkbox" id="ontop-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>Tema Tampilan</span>
                    <select id="theme-selector" style="background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; outline: none;">
                        <option value="default">Default Dark</option>
                        <option value="marvel">Marvel (MCU)</option>
                        <option value="pixel">Pixel Art Retro</option>
                        <option value="hacker">Terminal Hacker</option>
                        <option value="minecraft">Minecraft (Blocky)</option>
                        <option value="spiderman">Spider-Man (Web Slinger)</option>
                        <option value="toystory">Toy Story (Andy's Room)</option>
                    </select>
                </div>
            </div>
            <ul id="playlist-ul"></ul>
        </div>
    </div>

    <!-- YOUTUBE SEARCH & DOWNLOAD POPUP -->
<div id="yt-popup" class="playlist-overlay">
    <div class="popup-content" style="max-width: 400px;">
        <div class="popup-header">
            <h3>Cari Lagu</h3>
            <button id="close-yt-btn" class="header-btn">&times;</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="yt-url-input" placeholder="Ketik judul / link YT / Spotify..." style="flex: 1; padding: 10px;">
            <button id="start-yt-dl-btn" class="mode-btn active" style="border-radius: 8px;">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <!-- Teks status (Mencari / Mendownload) -->
        <div id="yt-status-text" style="text-align: center; font-size: 13px; color: #aaa; margin-bottom: 10px; display: none;"></div>

        <!-- Wadah untuk memunculkan daftar 5 lagu hasil pencarian -->
        <ul id="yt-search-results" style="list-style: none; max-height: 250px; overflow-y: auto; padding: 0; display: flex; flex-direction: column; gap: 10px;">
        </ul>
    </div>
</div>

<!-- POPUP LIRIK KARAOKE -->
<div id="lyrics-popup" class="playlist-overlay">
    <div class="popup-content" style="max-width: 500px; height: 70vh; display: flex; flex-direction: column;">
        <div class="popup-header">
            <h3><i class="fa-solid fa-music"></i> Lirik Berjalan</h3>
            <button id="close-lyrics-btn" class="header-btn">&times;</button>
        </div>

        <div id="lyrics-content" style="flex: 1; overflow-y: auto; padding: 20px 10px; text-align: center; scroll-behavior: smooth;">
            <p class="lyric-placeholder" style="color: #aaa; margin-top: 50px;">Memuat lirik...</p>
        </div>
    </div>
</div>

<!-- POPUP KONFIRMASI HAPUS KUSTOM -->
<div id="confirm-popup" class="playlist-overlay">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <h3 id="confirm-title" style="margin-bottom: 15px; font-size: 16px;">Hapus Lagu?</h3>
        <p id="confirm-message" class="confirm-text">Apakah Anda yakin ingin menghapus lagu ini?</p>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
            <button id="confirm-yes-btn" class="mode-btn active" style="padding: 8px 20px;">Ya</button>
            <button id="confirm-no-btn" class="mode-btn" style="padding: 8px 20px;">Batal</button>
        </div>
    </div>
</div>

    <script src="renderer.js"></script>
</body>
</html>
